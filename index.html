<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GYAR — Modelo de Distribución Inteligente v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0B0F0E;--bg2:#111615;--bg3:#161D1B;
  --surface:#1C2421;--surface2:#222C29;--surface3:#283230;
  --border:#2A3530;--border2:#334039;--border3:#3D4D47;
  --teal:#00C896;--teal2:#00A87E;--teal-dim:#00C89618;--teal-mid:#00C89635;
  --amber:#F0A030;--amber-dim:#F0A03015;--amber-mid:#F0A03030;
  --red:#E05050;--red-dim:#E0505015;--red-mid:#E0505030;
  --blue:#4A9EFF;--blue-dim:#4A9EFF15;--blue-mid:#4A9EFF30;
  --purple:#A78BFA;--purple-dim:#A78BFA15;
  --text:#E8F0ED;--text2:#8FA89F;--text3:#4D6660;--text4:#334039;
  --font-head:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;--font-mono:'DM Mono',monospace;
  --r:10px;--rl:16px;--rxl:22px;
  --shadow:0 8px 32px rgba(0,0,0,.5);--shadow-sm:0 2px 12px rgba(0,0,0,.3);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:14px;line-height:1.6;overflow-x:hidden}
::selection{background:var(--teal-mid);color:var(--teal)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ── LAYOUT ── */
.app{display:grid;grid-template-rows:auto auto 1fr;min-height:100vh;max-width:1280px;margin:0 auto;padding:0 28px}

/* ── HEADER ── */
.hdr{padding:28px 0 0;display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
.hdr h1{font-family:var(--font-head);font-size:23px;font-weight:800;letter-spacing:-.4px;line-height:1.2}
.hdr h1 em{font-style:normal;color:var(--teal)}
.hdr-meta{margin-top:5px;font-size:11px;color:var(--text3);font-family:var(--font-mono);display:flex;align-items:center;gap:8px}
.pulse{width:7px;height:7px;border-radius:50%;background:var(--teal);flex-shrink:0;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 var(--teal-mid)}60%{box-shadow:0 0 0 7px transparent}}
.badges{display:flex;gap:7px;flex-wrap:wrap;flex-shrink:0}
.badge{padding:4px 10px;border-radius:20px;font-size:10px;font-family:var(--font-mono);font-weight:500;border:1px solid;letter-spacing:.04em}
.bt{background:var(--teal-dim);color:var(--teal);border-color:var(--teal-mid)}
.ba{background:var(--amber-dim);color:var(--amber);border-color:var(--amber-mid)}

/* ── NAV ── */
.nav{padding:20px 0 0;display:flex;gap:3px;border-bottom:1px solid var(--border)}
.nb{display:flex;align-items:center;gap:6px;padding:9px 15px;border:none;background:none;color:var(--text3);font-family:var(--font-body);font-size:12px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .18s;border-radius:var(--r) var(--r) 0 0;white-space:nowrap}
.nb:hover{color:var(--text2);background:var(--surface)}
.nb.active{color:var(--teal);border-bottom-color:var(--teal);background:var(--bg2)}
.nb svg{width:13px;height:13px;flex-shrink:0}

/* ── MAIN ── */
.main{padding:24px 0 50px;animation:fi .22s ease}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

/* ── GRIDS ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.ga{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:10px}

/* ── SECTION ── */
.sec{margin-bottom:22px}
.sl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);font-family:var(--font-mono);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sl::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px 18px}
.card-xs{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:11px 13px;transition:.15s}
.card-xs:hover{border-color:var(--border2);background:var(--surface2)}
.card-click{cursor:pointer;transition:.15s}
.card-click:hover{border-color:var(--teal);box-shadow:0 0 0 1px var(--teal-mid)}

/* ── KPIs ── */
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px 15px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kpi.ok::before{background:var(--teal)}.kpi.w::before{background:var(--amber)}.kpi.d::before{background:var(--red)}
.kpi .kl{font-size:10px;color:var(--text3);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.kpi .kv{font-size:24px;font-weight:800;font-family:var(--font-head);line-height:1;margin-bottom:3px}
.kpi.ok .kv{color:var(--teal)}.kpi.w .kv{color:var(--amber)}.kpi.d .kv{color:var(--red)}
.kpi .ks{font-size:10px;color:var(--text3)}

/* ── PILLS ── */
.p{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600;font-family:var(--font-mono)}
.pt{background:var(--teal-dim);color:var(--teal)}.pa{background:var(--amber-dim);color:var(--amber)}
.pr{background:var(--red-dim);color:var(--red)}.pb{background:var(--blue-dim);color:var(--blue)}
.pg{background:var(--surface3);color:var(--text3);border:1px solid var(--border2)}
.pv{background:var(--purple-dim);color:var(--purple)}

/* ── TABLE ── */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{padding:7px 11px;text-align:left;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);font-family:var(--font-mono);border-bottom:1px solid var(--border)}
.tbl td{padding:8px 11px;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--text2)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--surface2);color:var(--text)}
.mn{font-family:var(--font-mono);font-size:11px}

/* ── BAR ── */
.bt2{background:var(--bg2);border-radius:4px;height:6px;overflow:hidden;flex:1}
.bf{height:100%;border-radius:4px;transition:width .5s}

/* ── SLIDER ── */
input[type=range]{-webkit-appearance:none;width:100%;height:3px;border-radius:2px;background:var(--border2);outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--teal);cursor:pointer;box-shadow:0 0 0 3px var(--teal-dim);transition:.1s}
input[type=range]::-webkit-slider-thumb:hover{box-shadow:0 0 0 5px var(--teal-mid)}

/* ── BUTTON ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface);color:var(--text2);font-family:var(--font-body);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--surface2);color:var(--text);border-color:var(--border3)}
.btn-teal{background:var(--teal-dim);border-color:var(--teal-mid);color:var(--teal)}
.btn-teal:hover{background:var(--teal-mid);color:#fff}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-amber{background:var(--amber-dim);border-color:var(--amber-mid);color:var(--amber)}
.btn-reset{background:var(--red-dim);border-color:var(--red-mid);color:var(--red)}
.btn-reset:hover{background:var(--red-mid);color:#fff}

/* ── FORMULA ── */
.formula{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px;font-family:var(--font-mono);font-size:12px;line-height:2;color:var(--text2);cursor:pointer;transition:.15s;position:relative}
.formula:hover{border-color:var(--teal);box-shadow:0 0 0 1px var(--teal-mid)}
.formula .cm{color:var(--text3);font-size:11px}.formula .hl{color:var(--teal)}.formula .hl2{color:var(--amber)}
.formula-hint{position:absolute;top:8px;right:10px;font-size:10px;color:var(--teal);font-family:var(--font-mono);opacity:.7}

/* ── FLOW ── */
.flow{display:flex;align-items:center;gap:0;overflow-x:auto;padding-bottom:2px}
.fs{flex:1;min-width:88px;background:var(--surface);border:1px solid var(--border);padding:9px 11px;text-align:center;font-size:11px}
.fs:first-child{border-radius:var(--r) 0 0 var(--r)}.fs:last-child{border-radius:0 var(--r) var(--r) 0}
.fs-n{font-size:9px;color:var(--text3);font-family:var(--font-mono);margin-bottom:3px}
.fs-t{font-weight:700;font-size:11px;color:var(--text);font-family:var(--font-head);line-height:1.3}
.fa{color:var(--text3);font-size:11px;padding:0 3px;flex-shrink:0}

/* ── ALERT ── */
.al{display:flex;gap:9px;padding:9px 12px;border-radius:var(--r);border:1px solid;margin-bottom:6px;font-size:12px}
.al-r{background:var(--red-dim);border-color:var(--red-mid);color:#F09090}
.al-a{background:var(--amber-dim);border-color:var(--amber-mid);color:#F0C070}
.al-t{background:var(--teal-dim);border-color:var(--teal-mid);color:#60DDB0}
.al-b{background:var(--blue-dim);border-color:var(--blue-mid);color:#90C8FF}
.al .at{font-weight:600;font-family:var(--font-head);font-size:12px;margin-bottom:1px}
.al .as{font-size:11px;opacity:.85;line-height:1.4}

/* ── GESTOR CARD ── */
.gc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:11px 12px;transition:.15s}
.gc:hover{border-color:var(--border2)}
.gc-code{font-family:var(--font-mono);font-size:11px;color:var(--teal);font-weight:500;margin-bottom:7px}
.gc-s{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:2px}
.gc-s span{color:var(--text2);font-weight:500}

/* ══════════════════════════════════════════
   MODAL SYSTEM
══════════════════════════════════════════ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);animation:fadeOv .2s ease}
@keyframes fadeOv{from{opacity:0}to{opacity:1}}
.modal-overlay.closing{animation:fadeOvOut .15s ease forwards}
@keyframes fadeOvOut{from{opacity:1}to{opacity:0}}
.modal-box{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rxl);width:100%;max-width:740px;max-height:88vh;display:flex;flex-direction:column;box-shadow:var(--shadow);animation:scaleIn .2s ease}
@keyframes scaleIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.modal-box.modal-lg{max-width:920px}
.modal-box.modal-xl{max-width:1100px}
.modal-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:20px 22px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-hdr h2{font-family:var(--font-head);font-size:16px;font-weight:700;color:var(--text);line-height:1.3}
.modal-hdr .modal-sub{font-size:11px;color:var(--text3);margin-top:3px;font-family:var(--font-mono)}
.modal-close{width:30px;height:30px;border-radius:50%;background:var(--surface);border:1px solid var(--border2);color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;transition:.15s;line-height:1}
.modal-close:hover{background:var(--surface2);color:var(--text)}
.modal-body{padding:20px 22px;overflow-y:auto;flex:1}
.modal-footer{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0}

/* Scenario builder */
.scenario-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.sce-left{display:flex;flex-direction:column;gap:14px}
.sce-right{background:var(--bg);border-radius:var(--rl);padding:16px;border:1px solid var(--border)}
.sce-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);font-family:var(--font-mono);margin-bottom:10px}
.sce-formula{font-family:var(--font-mono);font-size:13px;line-height:2.1;padding:12px 14px;background:var(--surface);border-radius:var(--r);border:1px solid var(--border);margin-bottom:10px}
.sce-formula .hl{color:var(--teal);font-weight:500}.sce-formula .hl2{color:var(--amber)}
.slider-row{display:flex;align-items:center;gap:10px;margin-bottom:11px}
.slider-row label{font-size:11px;color:var(--text3);min-width:120px;line-height:1.3}
.slider-row .sv{font-family:var(--font-mono);font-size:12px;font-weight:500;color:var(--teal);min-width:36px;text-align:right}
.exp-selector{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.exp-btn{padding:4px 10px;border-radius:20px;font-size:10px;font-family:var(--font-mono);border:1px solid var(--border2);background:var(--surface);color:var(--text3);cursor:pointer;transition:.13s}
.exp-btn.active{background:var(--teal-dim);border-color:var(--teal-mid);color:var(--teal)}
.score-display{text-align:center;padding:16px;background:var(--surface);border-radius:var(--r);border:1px solid var(--border);margin-bottom:10px}
.score-big{font-size:48px;font-weight:800;font-family:var(--font-head);line-height:1}
.score-label{font-size:11px;color:var(--text3);margin-top:4px}
.score-breakdown{display:flex;flex-direction:column;gap:5px}
.sb-row{display:flex;justify-content:space-between;align-items:center;font-size:11px;padding:5px 8px;border-radius:6px;background:var(--surface2)}
.sb-row .sb-l{color:var(--text3)}.sb-row .sb-v{font-family:var(--font-mono);font-weight:500}
.saved-scenarios{display:flex;flex-direction:column;gap:5px;margin-top:10px}
.saved-sc{display:flex;justify-content:space-between;align-items:center;padding:7px 10px;border-radius:var(--r);background:var(--surface);border:1px solid var(--border);font-size:11px;cursor:pointer;transition:.13s}
.saved-sc:hover{border-color:var(--teal-mid)}
.saved-sc .sc-name{font-weight:500;color:var(--text)}
.saved-sc .sc-score{font-family:var(--font-mono);color:var(--teal)}

/* Phase modal */
.phase-section{margin-bottom:18px}
.phase-section h3{font-family:var(--font-head);font-size:13px;font-weight:700;color:var(--teal);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.phase-task{display:flex;gap:10px;padding:7px 10px;border-radius:var(--r);background:var(--surface);margin-bottom:5px;font-size:12px;border:1px solid var(--border)}
.phase-task .pt-n{width:22px;height:22px;border-radius:50%;background:var(--teal-dim);color:var(--teal);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:var(--font-mono)}
.phase-task .pt-body .pt-t{font-weight:600;color:var(--text);margin-bottom:1px}
.phase-task .pt-body .pt-d{color:var(--text3);font-size:11px;line-height:1.4}
.deliverable{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:6px;background:var(--teal-dim);border:1px solid var(--teal-mid);font-size:11px;color:var(--teal);margin-bottom:5px}
.risk-item{display:flex;align-items:flex-start;gap:8px;padding:6px 10px;border-radius:6px;background:var(--amber-dim);border:1px solid var(--amber-mid);font-size:11px;color:var(--amber);margin-bottom:5px;line-height:1.4}

/* Print area */
@media print{
  .modal-overlay{position:static;background:white;color:black}
  .modal-box{max-height:none;box-shadow:none;border:none}
  .modal-footer,.modal-close,.no-print{display:none!important}
  body{background:white;color:black}
}

/* Scrollbar in modal */
.modal-body::-webkit-scrollbar{width:4px}
.modal-body::-webkit-scrollbar-thumb{background:var(--border2)}

/* ── RESPONSIVE ── */
@media(max-width:720px){
  .g4{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr}.g2{grid-template-columns:1fr}
  .scenario-grid{grid-template-columns:1fr}.nav{gap:2px}.nb{padding:7px 9px;font-size:11px}
  .hdr{flex-direction:column}.app{padding:0 16px}
}
</style>
</head>
<body>
<div class="app">

<!-- HEADER -->
<div class="hdr">
  <div>
    <h1>GYAR — <em>Distribución</em> inteligente</h1>
    <div class="hdr-meta"><span class="pulse"></span> Operación activa · 39 gestores · ~12.000 exp/día · umbral crítico 90 días</div>
  </div>
  <div class="badges"><span class="badge bt">I Reto Cátedra OPPLUS-UMA</span><span class="badge ba">MVP v2.0</span></div>
</div>

<!-- NAV -->
<nav class="nav">
  <button class="nb active" onclick="goTab('dashboard')" data-tab="dashboard">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="6" height="6" rx="1.5"/><rect x="9" y="1" width="6" height="6" rx="1.5"/><rect x="1" y="9" width="6" height="6" rx="1.5"/><rect x="9" y="9" width="6" height="6" rx="1.5"/></svg>
    Dashboard
  </button>
  <button class="nb" onclick="goTab('scoring')" data-tab="scoring">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="12" height="12" rx="2"/><path d="M5 8h6M5 5.5h3M5 10.5h4"/></svg>
    Scoring [A]
  </button>
  <button class="nb" onclick="goTab('algoritmo')" data-tab="algoritmo">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="3" r="1.5"/><circle cx="3" cy="13" r="1.5"/><circle cx="13" cy="13" r="1.5"/><path d="M8 4.5v3M8 7.5L3 11.5M8 7.5L13 11.5"/></svg>
    Algoritmo [B]
  </button>
  <button class="nb" onclick="goTab('reactivaciones')" data-tab="reactivaciones">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M13 8A5 5 0 1 1 3.5 5"/><path d="M3 2l.5 3 3-.5"/></svg>
    Reactivaciones [C]
  </button>
  <button class="nb" onclick="goTab('plan')" data-tab="plan">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 14V5l6-3 6 3v9"/><path d="M6 14v-4h4v4"/></svg>
    Plan MVP [E]
  </button>
</nav>

<main class="main" id="main"></main>
</div>

<!-- ══════════════ MODAL SYSTEM ══════════════ -->
<div id="modal-container"></div>

<script>
// ═══════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════
const DEFAULT_WEIGHTS = {w1:40,w2:25,w3:20,w4:15};
let weights = {...DEFAULT_WEIGHTS};
let scenarios = [];
let activeScenarioExp = 0;

const gestores = [
  {code:'G-01',exp:301,dif:5.2,tramo:'31–60',pct:100,status:'ok'},
  {code:'G-03',exp:298,dif:4.8,tramo:'1–30',pct:99,status:'ok'},
  {code:'G-04',exp:287,dif:7.8,tramo:'61–90',pct:96,status:'w'},
  {code:'G-07',exp:312,dif:8.4,tramo:'61–90',pct:104,status:'d'},
  {code:'G-09',exp:295,dif:5.1,tramo:'31–60',pct:98,status:'ok'},
  {code:'G-12',exp:278,dif:4.1,tramo:'1–30',pct:93,status:'ok'},
  {code:'G-15',exp:303,dif:6.3,tramo:'31–60',pct:101,status:'ok'},
  {code:'G-22',exp:291,dif:6.0,tramo:'31–60',pct:97,status:'ok'},
];

const expData = [
  {id:'EXP-001',gest:'G-07',dias:87,tramo:'61–90',importe:18400,reactiv:2,pbase:9},
  {id:'EXP-042',gest:'G-04',dias:68,tramo:'61–90',importe:9200,reactiv:3,pbase:8},
  {id:'EXP-117',gest:'G-15',dias:45,tramo:'31–60',importe:22000,reactiv:1,pbase:7},
  {id:'EXP-203',gest:'G-01',dias:28,tramo:'1–30',importe:3100,reactiv:0,pbase:5},
  {id:'EXP-389',gest:'G-09',dias:55,tramo:'31–60',importe:7600,reactiv:2,pbase:6},
  {id:'EXP-501',gest:'G-04',dias:82,tramo:'61–90',importe:14200,reactiv:4,pbase:9},

// ═══════════════════════════════════════════════════
// SCORING
// ═══════════════════════════════════════════════════
function calcScore(e, w1, w2, w3, w4) {
  const W1=w1/100, W2=w2/100, W3=w3/100, W4=w4/100;
  const u = e.dias>80?9.5:e.dias>60?7.5:e.dias>30?5.0:3.0;
  const i = Math.min(10,(e.importe/25000)*10);
  const c = Math.min(10,2+e.reactiv*2+(e.pbase>7?1.5:0));
  const p = e.pbase;
  return Math.round((W1*u+W2*i+W3*c+W4*p)*10)/10;
}
function getScoreColor(s){return s>=8?'var(--red)':s>=6?'var(--amber)':s>=4?'var(--blue)':'var(--text3)'}
function scorePill(s){
  if(s>=8)return'<span class="p pr">CRÍTICO</span>';
  if(s>=6)return'<span class="p pa">ALTO</span>';
  if(s>=4)return'<span class="p pb">MEDIO</span>';
  return'<span class="p pg">ESTÁNDAR</span>';
}
function scoreLabel(s){
  if(s>=8)return'CRÍTICO';if(s>=6)return'ALTO';if(s>=4)return'MEDIO';return'ESTÁNDAR';
}

function openModal(content, size='') {
  const c = document.getElementById('modal-container');
  c.innerHTML = `<div class="modal-overlay" id="mo" onclick="closeOnBg(event)">
    <div class="modal-box ${size}" id="mb">${content}</div>
  </div>`;
}
function closeModal() {
  const mo = document.getElementById('mo');
  if(!mo) return;
  mo.classList.add('closing');
  setTimeout(()=>{ document.getElementById('modal-container').innerHTML=''; },150);
}
function closeOnBg(e){ if(e.target.id==='mo') closeModal(); }
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

function mHdr(title, sub='', icon='') {
  return `<div class="modal-hdr">
    <div><h2>${icon?icon+' ':''} ${title}</h2>${sub?`<div class="modal-sub">${sub}</div>`:''}
    </div>
    <button class="modal-close" onclick="closeModal()">✕</button>
  </div>`;
}
function mFooter(extraBtns='') {
  return `<div class="modal-footer no-print">
    ${extraBtns}
    <button class="btn btn-sm" onclick="closeModal()">Cerrar</button>
  </div>`;
}

function selectScExp(i) {
  activeScenarioExp = i;
  document.querySelectorAll('.exp-btn').forEach((b,j)=>b.classList.toggle('active',j===i));
  updateScenario();
}

function updateScenario() {
  const w1=parseInt(document.getElementById('sc-w1')?.value||40);
  const w2=parseInt(document.getElementById('sc-w2')?.value||25);
  const w3=parseInt(document.getElementById('sc-w3')?.value||20);
  const w4=parseInt(document.getElementById('sc-w4')?.value||15);
  ['sc-w1','sc-w2','sc-w3','sc-w4'].forEach((id,i)=>{
    const v=[w1,w2,w3,w4][i];
    const el=document.getElementById(id+'v');
    if(el) el.textContent=(v/100).toFixed(2);
  });
  const sum=(w1+w2+w3+w4)/100;
  const se=document.getElementById('sc-sum');
  if(se){se.textContent=sum.toFixed(2);se.style.color=Math.abs(sum-1)>0.05?'var(--amber)':'var(--teal)';}
  const e=expData[activeScenarioExp];
  const info=document.getElementById('sc-exp-info');
  if(info) info.innerHTML=`Días: ${e.dias} · Tramo: ${e.tramo} · Importe: ${e.importe.toLocaleString()}€<br>Reactivaciones: ${e.reactiv} · Prioridad base: ${e.pbase} · Gestor: ${e.gest}`;
  const W1=w1/100,W2=w2/100,W3=w3/100,W4=w4/100;
  const u=e.dias>80?9.5:e.dias>60?7.5:e.dias>30?5.0:3.0;
  const im=Math.min(10,(e.importe/25000)*10);
  const c=Math.min(10,2+e.reactiv*2+(e.pbase>7?1.5:0));
  const p=e.pbase;
  const s=Math.round((W1*u+W2*im+W3*c+W4*p)*10)/10;
  const color=getScoreColor(s);
  const big=document.getElementById('sc-big');
  if(big){big.textContent=s.toFixed(1);big.style.color=color;}
  const sl=document.getElementById('sc-slabel');
  if(sl) sl.innerHTML=`<span style="color:${color};font-weight:700">${scoreLabel(s)}</span> · ${e.id} · ${e.gest}`;
  const fl=document.getElementById('sc-formula-live');
  if(fl) fl.innerHTML=`<span class="hl">S(${e.id})</span> = ${W1.toFixed(2)}×<span class="hl2">${u.toFixed(1)}</span> + ${W2.toFixed(2)}×<span class="hl2">${im.toFixed(1)}</span> + ${W3.toFixed(2)}×<span class="hl2">${c.toFixed(1)}</span> + ${W4.toFixed(2)}×<span class="hl2">${p.toFixed(1)}</span><br>= <span class="hl" style="font-size:15px;font-weight:700">${s.toFixed(1)}</span> → ${scoreLabel(s)}`;
  const bk=document.getElementById('sc-breakdown');
  if(bk) bk.innerHTML=[
    {l:'Urgencia temporal U(d)',raw:u,weighted:W1*u,w:W1},
    {l:'Impacto económico I(m)',raw:im,weighted:W2*im,w:W2},
    {l:'Complejidad historial C(h)',raw:c,weighted:W3*c,w:W3},
    {l:'Prioridad base P',raw:p,weighted:W4*p,w:W4},
  ].map(b=>`<div class="sb-row">
    <span class="sb-l">${b.l}</span>
    <span style="font-size:10px;color:var(--text3)">${b.raw.toFixed(1)} × ${b.w.toFixed(2)}</span>
    <span class="sb-v" style="color:${b.weighted>2?'var(--teal)':'var(--text3)'}">${b.weighted.toFixed(2)}</span>
  </div>`).join('');
  const interp=document.getElementById('sc-interpretation');
  if(interp){
    const texts={
      'CRÍTICO':'Gestión inmediata. Riesgo de mora en días. Asignar a gestor con menor carga actual en tramo 3.',
      'ALTO':'Prioridad alta. Tramo 31–60, seguimiento intensivo requerido. Asignar gestor especializado.',
      'MEDIO':'Gestión planificada. Tramo 1–30, ventana de actuación amplia. Cola estándar priorizada.',
      'ESTÁNDAR':'Gestión normal. Sin urgencia temporal. Asignar según disponibilidad del gestor.'
    };
    interp.textContent=texts[scoreLabel(s)];
    interp.style.color=color;
  }
}

function saveScenario() {
  const w1=parseInt(document.getElementById('sc-w1')?.value||40);
  const w2=parseInt(document.getElementById('sc-w2')?.value||25);
  const w3=parseInt(document.getElementById('sc-w3')?.value||20);
  const w4=parseInt(document.getElementById('sc-w4')?.value||15);
  const e=expData[activeScenarioExp];
  const s=calcScore(e,w1,w2,w3,w4);
  const n=scenarios.length+1;
  scenarios.push({name:`Escenario ${n}`,w1,w2,w3,w4,score:s,exp:e.id});
  renderSavedScenarios();
}

function renderSavedScenarios() {
  const el=document.getElementById('sc-saved-list');
  if(!el) return;
  if(scenarios.length===0){el.innerHTML='<div style="font-size:11px;color:var(--text3);font-style:italic">Sin escenarios guardados aún.</div>';return;}
  el.innerHTML=scenarios.map((sc,i)=>`
  <div class="saved-sc" onclick="loadScenario(${i})">
    <span class="sc-name">${sc.name} <span style="font-size:10px;color:var(--text3)">(${sc.exp})</span></span>
    <div style="display:flex;align-items:center;gap:8px">
      <span style="font-size:10px;color:var(--text3)">${(sc.w1/100).toFixed(2)}/${(sc.w2/100).toFixed(2)}/${(sc.w3/100).toFixed(2)}/${(sc.w4/100).toFixed(2)}</span>
      <span class="sc-score">${sc.score.toFixed(1)}</span>
      <button onclick="deleteScenario(event,${i})" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:12px">✕</button>
    </div>
  </div>`).join('');
}

function loadScenario(i) {
  const sc=scenarios[i];
  ['sc-w1','sc-w2','sc-w3','sc-w4'].forEach((id,j)=>{
    const el=document.getElementById(id);
    if(el) el.value=[sc.w1,sc.w2,sc.w3,sc.w4][j];
  });
  updateScenario();
}

function deleteScenario(e,i) {
  e.stopPropagation();
  scenarios.splice(i,1);
  renderSavedScenarios();
}

function resetScenario() {
  ['sc-w1','sc-w2','sc-w3','sc-w4'].forEach((id,i)=>{
    const el=document.getElementById(id);
    if(el) el.value=[DEFAULT_WEIGHTS.w1,DEFAULT_WEIGHTS.w2,DEFAULT_WEIGHTS.w3,DEFAULT_WEIGHTS.w4][i];
  });
  updateScenario();
}

function applyScenario() {
  weights.w1=parseInt(document.getElementById('sc-w1')?.value||40);
  weights.w2=parseInt(document.getElementById('sc-w2')?.value||25);
  weights.w3=parseInt(document.getElementById('sc-w3')?.value||20);
  weights.w4=parseInt(document.getElementById('sc-w4')?.value||15);
  closeModal();
  if(document.querySelector('.nb.active')?.dataset?.tab==='scoring'){
    goTab('scoring');
  }
}

      {tag:'Recomendado fase 1',color:'var(--teal)',title:'T1 — Recuperación antes del día 60',type:'Clasificación binaria (0/1)',desc:`<strong>Definición:</strong> el expediente fue gestionado y resuelto favorablemente antes de alcanzar 60 días de impago. Es el target más directo porque está alineado con el KPI principal del reto.<br><br><strong>Cómo etiquetarlo:</strong> para cada expediente histórico, consultar en NEXA si existe registro de cierre/recuperación con fecha anterior a día 60. Si existe → 1 (éxito). Si no existe → 0 (fracaso o mora).<br><br><strong>Ventajas:</strong> binario y fácil de interpretar, directamente accionable, alta separabilidad de clases, probabilidades de salida del modelo son directamente scores de prioridad.<br><br><strong>Limitación principal:</strong> no distingue entre recuperar 100€ y recuperar 50.000€. Dos expedientes con distinto impacto económico reciben el mismo peso en el entrenamiento. Se mitiga en T2.`,pros:['Binario · fácil de etiquetar','Directamente alineado con KPI','Alta separabilidad de clases','Requiere historial > 6 meses']},

      {tag:'Alternativa operativa',color:'var(--blue)',title:'T3 — Esfuerzo estimado (minutos de gestión)',type:'Regresión continua [minutos]',desc:`<strong>Definición:</strong> tiempo real invertido por el gestor en resolver completamente el expediente, desde asignación hasta cierre en NEXA.<br><br><strong>Para qué sirve:</strong> permite optimizar la carga real de trabajo, no solo la prioridad. Si el modelo puede predecir que un expediente tardará 45 minutos vs 5 minutos, el algoritmo de asignación puede crear colas de dificultad real equilibrada entre gestores.<br><br><strong>Condición de uso:</strong> requiere que NEXA registre tiempos de inicio y fin de gestión por expediente. Si este dato no está disponible, el target no puede calcularse.<br><br><strong>Uso combinado:</strong> T1 + T3 forman un sistema de doble objetivo: prioridad por urgencia (T1) + equidad de carga real (T3). Esta combinación captura exactamente el problema del reto.`,pros:['Optimiza capacidad real','Mejora equidad de carga','Requiere registro de tiempos en NEXA','Puede no estar disponible ahora']},
    ].map(t=>`
    <div style="margin-bottom:14px;border:1px solid var(--border2);border-radius:var(--rl);overflow:hidden">
      <div style="background:${t.color}18;border-bottom:1px solid ${t.color}30;padding:10px 14px;display:flex;align-items:center;justify-content:space-between">
        <div>
          <span style="font-size:10px;font-weight:700;color:${t.color};font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.06em;margin-right:10px">${t.tag}</span>
          <span style="font-size:13px;font-weight:700;color:var(--text);font-family:var(--font-head)">${t.title}</span>
        </div>
        <span style="font-size:10px;font-family:var(--font-mono);color:${t.color}">${t.type}</span>
      </div>
      <div style="padding:12px 14px">
        <div style="font-size:12px;color:var(--text3);line-height:1.7;margin-bottom:10px">${t.desc}</div>
        <div style="display:flex;flex-wrap:wrap;gap:5px">${t.pros.map(pro=>`<span style="padding:2px 8px;border-radius:10px;font-size:10px;font-family:var(--font-mono);background:${t.color}15;color:${t.color};border:1px solid ${t.color}25">${pro}</span>`).join('')}</div>
      </div>
    </div>`).join('')}
    <div style="padding:10px 14px;background:var(--surface);border-radius:var(--r);font-size:11px;color:var(--text3);border-left:3px solid var(--teal)">
      <strong style="color:var(--teal)">Estrategia recomendada GYAR:</strong> comenzar con T1 (clasificación binaria) en fase 1. Tras validar el modelo, añadir T2 como segunda cabeza del modelo o como modelo paralelo. T3 solo si NEXA registra tiempos. El target T1 requiere mínimo 10.000–15.000 expedientes etiquetados para un modelo fiable.
    </div>
  </div>
  ${mFooter()}
  `,'modal-lg');
}

function openAlgoModal() {
  openModal(`

  <div class="modal-body">
    <div style="padding:10px 14px;background:var(--teal-dim);border:1px solid var(--teal-mid);border-radius:var(--r);font-size:12px;color:var(--teal);margin-bottom:16px">
      <strong>Criterio de selección:</strong> en contexto operativo regulado, el criterio no es solo AUC-ROC sino <strong>rendimiento + explicabilidad + facilidad de validación ante el equipo</strong>. Un modelo que nadie puede explicar no se despliega en producción.
    </div>
    ${[
      {tag:'Recomendado',color:'var(--teal)',name:'XGBoost / LightGBM + SHAP values',type:'Gradient Boosted Trees',desc:`Aprende relaciones no lineales entre features (días impago × reactivaciones × importe) que las reglas simples no capturan. SHAP values nativos permiten explicar cada predicción individual: "este expediente tiene score 8.4 porque tiene 78 días (+2.1), 3 reactivaciones (+1.8) e importe alto (+0.9)". Tolerante a features faltantes y escalas distintas. Entrena en minutos con los volúmenes de GYAR (~12.000 exp/día × 6 meses = ~2M registros).`,rendimiento:'Alto',explicabilidad:'Alta (SHAP)',tiempo:'Minutos',pros:['SHAP values por expediente','Robusto a missing values','No requiere normalización','Feature importance nativa','Hiperparámetros bien documentados']},
      {tag:'Baseline obligatorio',color:'var(--blue)',name:'Regresión logística (Lasso/Ridge)',type:'Modelo lineal regularizado',desc:`El mejor punto de partida para entender qué features importan. Coeficientes directamente interpretables: "cada día adicional de impago reduce 0.03 la probabilidad de recuperación". Sirve como benchmark: si XGBoost no supera a la regresión logística, el dataset probablemente tiene problemas de calidad o el feature engineering es insuficiente. Rápido, auditable y sin sorpresas.`,rendimiento:'Moderado',explicabilidad:'Máxima',tiempo:'Segundos',pros:['Coeficientes directamente legibles','Benchmark de comparación obligatorio','Máxima auditabilidad','Detecta problemas en el dataset']},
      {tag:'Alternativa robusta',color:'var(--amber)',name:'Random Forest calibrado',type:'Ensamble de árboles (bagging)',desc:`Similar a XGBoost en rendimiento pero más estable con datasets pequeños. Las probabilidades de salida necesitan calibración (Platt scaling o isotonic regression) para ser usadas como scores. Feature importance disponible pero menos granular que SHAP. Buena opción si el equipo técnico es más familiar con scikit-learn que con XGBoost. Menor riesgo de overfitting en fase inicial.`,rendimiento:'Alto',explicabilidad:'Media',tiempo:'Minutos',pros:['Estable con datasets pequeños','Menos overfitting en fase inicial','Compatible con scikit-learn','Calibración de probabilidades necesaria']},
    ].map(a=>`
    <div style="margin-bottom:14px;border:1px solid ${a.color}30;border-radius:var(--rl);overflow:hidden;${a.tag==='Recomendado'?'border-color:'+a.color+';box-shadow:0 0 0 1px '+a.color+'30':''}">
      <div style="background:${a.color}15;border-bottom:1px solid ${a.color}20;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
        <div style="display:flex;align-items:center;gap:10px">

          <span style="font-size:13px;font-weight:700;color:var(--text);font-family:var(--font-head)">${a.name}</span>
        </div>
        <span style="font-size:10px;color:var(--text3);font-family:var(--font-mono)">${a.type}</span>
      </div>
      <div style="padding:12px 14px">
        <div style="font-size:12px;color:var(--text3);line-height:1.7;margin-bottom:10px">${a.desc}</div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px">
          ${[{l:'Rendimiento',v:a.rendimiento},{l:'Explicabilidad',v:a.explicabilidad},{l:'Tiempo entreno',v:a.tiempo}].map(m=>
            `<div style="text-align:center;padding:7px;background:var(--surface);border-radius:var(--r)"><div style="font-size:10px;color:var(--text3);margin-bottom:2px">${m.l}</div><div style="font-size:12px;font-weight:600;color:${a.color}">${m.v}</div></div>`
          ).join('')}
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:5px">${a.pros.map(pro=>`<span style="padding:2px 8px;border-radius:10px;font-size:10px;font-family:var(--font-mono);background:${a.color}12;color:${a.color};border:1px solid ${a.color}20">${pro}</span>`).join('')}</div>
      </div>
    </div>`).join('')}
    <div style="padding:10px 14px;background:var(--red-dim);border-radius:var(--r);font-size:11px;color:var(--text2);border-left:3px solid var(--red)">
      <strong style="color:var(--red)">Por qué NO redes neuronales en fase 1:</strong> sobredimensionadas para este problema, difícilmente auditables y requieren 10× más datos. El supervisor de operaciones debe poder entender por qué un expediente fue priorizado — SHAP + XGBoost lo permite, una red neuronal no.
    </div>
  </div>
  ${mFooter()}
  `,'modal-lg');
}

const cargasData = [
  {n:1,color:'var(--teal)',title:'Eliminación de decisiones manuales de priorización',estimacion:'~45 min/día/gestor × 39 = 1.755 min = 1.0 carga',detail:`<strong>Situación actual:</strong> cada gestor debe revisar su bandeja de entrada y decidir manualmente qué expediente gestionar primero, evaluando días de impago, importe y urgencia. Este proceso consume entre 30 y 60 minutos diarios por gestor en decisiones repetitivas sin criterio unificado.<br><br><strong>Solución:</strong> el scoring automático S(e) calcula la prioridad de cada expediente antes de que el gestor abra su cola. La bandeja llega ya ordenada de mayor a menor urgencia. El gestor simplemente trabaja el primero de la lista.<br><br><strong>Impacto operativo:</strong> 1.755 minutos/día liberados = ~5,85 horas/día del equipo = 1 carga de trabajo completa. Adicionalmente, se elimina la variabilidad en los criterios de priorización entre gestores.`,kpi:'−30% tiempo de decisión individual',icono:'🎯'},
  {n:2,color:'var(--amber)',title:'Reparto automático sin coordinación manual entre supervisores',estimacion:'~30 min/día en coordinación = 0.9 cargas',detail:`<strong>Situación actual:</strong> el supervisor destina tiempo diario a coordinar el reparto de expedientes entre gestores, equilibrar cargas, resolver conflictos de asignación y gestionar solicitudes de redistribución. Este proceso ocurre en el inicio de jornada y frecuentemente durante el día.<br><br><strong>Solución:</strong> el algoritmo de distribución genera automáticamente la asignación óptima considerando capacidad de cada gestor, especialización por tramo, índice de dificultad media acumulada y cupo de reactivaciones. El supervisor recibe el reparto hecho y solo debe validarlo o ajustarlo excepcionalmente.<br><br><strong>Impacto operativo:</strong> ~30 min/día de coordinación eliminados. El supervisor puede dedicar ese tiempo a gestión de alertas críticas y casos de mayor complejidad.`,kpi:'−80% tiempo de coordinación de reparto',icono:'⚖'},
  {n:3,color:'var(--blue)',title:'Gestión de reactivaciones sin curación manual',estimacion:'~25 min/día = 0.7 cargas',detail:`<strong>Situación actual:</strong> las reactivaciones se mezclan con los expedientes nuevos en la bandeja general. Los gestores deben identificarlas, decidir su prioridad y gestionar el seguimiento de forma manual, sin información sistematizada del historial de intentos previos.<br><br><strong>Solución:</strong> la cola separada de reactivaciones con cupo del 8% y el sistema de escalado automático (1×→2×→3×→4×+) asigna cada reactivación a la categoría correcta, notifica al supervisor cuando corresponde y garantiza que no colapsen la capacidad.<br><br><strong>Impacto operativo:</strong> ~25 min/día de revisión manual eliminados. Las reactivaciones críticas (4ª+ vez) se detectan automáticamente y escalan sin intervención humana.`,kpi:'−100% revisión manual de reactivaciones',icono:'↻'},
  {n:4,color:'var(--purple)',title:'Alertas automáticas vs revisión periódica manual del estado',estimacion:'~20 min/día = 0.6 cargas',detail:`<strong>Situación actual:</strong> el supervisor realiza revisiones periódicas del estado del equipo (expedientes pendientes, gestores atascados, casos próximos a mora) consultando manualmente los sistemas TRANSMI y NEXA, sin una vista consolidada ni alertas proactivas.<br><br><strong>Solución:</strong> el dashboard operativo con alertas automáticas detecta y notifica proactivamente: expedientes a menos de 5 días del umbral, gestores con desequilibrio de dificultad >1.5×, reactivaciones superando el cupo, y oportunidades de mejora. El supervisor actúa por excepción, no por revisión sistemática.<br><br><strong>Impacto operativo:</strong> ~20 min/día de revisiones manuales eliminadas. La velocidad de respuesta ante alertas críticas mejora de horas a minutos.`,kpi:'−100% revisiones manuales de estado',icono:'🔔'},
  {n:5,color:'var(--red)',title:'Informes de cierre de jornada y seguimiento de KPIs',estimacion:'~15 min/día = 0.5 cargas',detail:`<strong>Situación actual:</strong> al cierre de jornada, el equipo de supervisión elabora manualmente informes de productividad, expedientes gestionados vs objetivo, incidencias del día y proyección para el día siguiente. Este proceso consume tiempo operativo valioso al final de la jornada cuando la presión es máxima.<br><br><strong>Solución:</strong> el dashboard genera automáticamente el resumen de cierre de jornada: expedientes gestionados/objetivo, productividad por gestor, alertas resueltas vs pendientes, proyección de cola para el día siguiente y expedientes en riesgo de mora. Exportable en un clic.<br><br><strong>Impacto operativo:</strong> ~15 min/día de elaboración manual de informes eliminados. El informe está disponible en tiempo real durante toda la jornada, no solo al cierre. Permite ajustes intraday si se detectan desviaciones.`,kpi:'Informes de cierre en tiempo real automáticos',icono:'📊'},

function exportWord(id, name) {
  const area = document.getElementById(id);
  if(!area) return;
  const content = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word'><head><meta charset='utf-8'><title>${name}</title></head><body style="font-family:Calibri,sans-serif;font-size:11pt;color:#000">${area.innerHTML}</body></html>`;
  const blob = new Blob([content],{type:'application/msword'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url;a.download=name+'.doc';a.click();
  URL.revokeObjectURL(url);
}

function simData(){
  const exp=parseInt(document.getElementById('sim-exp')?.value||12000);
  const gest=parseInt(document.getElementById('sim-gest')?.value||39);
  const rp=parseInt(document.getElementById('sim-rp')?.value||7);
  const cap=gest*300;
  const reactiv=Math.round(exp*(rp/100));
  const cupo=Math.min(reactiv,Math.round(cap*0.08));
  const gestionados=Math.min(exp,cap);
  const pendientes=Math.max(0,exp-cap);
  ['sim-exp-v','sim-gest-v','sim-rp-v'].forEach((id,i)=>{
    const el=document.getElementById(id);
    if(el) el.textContent=[exp.toLocaleString(),gest,rp+'%'][i];
  });
  [['sim-cap-v',cap.toLocaleString()],['sim-react-v',cupo.toLocaleString()],['sim-gest-tot',gestionados.toLocaleString()],['sim-pend-v',pendientes.toLocaleString()]].forEach(([id,v])=>{
    const el=document.getElementById(id);
    if(el) el.textContent=v;
  });
  const pend=document.getElementById('sim-pend-v');
  if(pend) pend.style.color=pendientes>500?'var(--red)':pendientes>0?'var(--amber)':'var(--teal)';
}

function recalcScoring(){
  const w1=parseInt(document.getElementById('w1')?.value||weights.w1);
  const w2=parseInt(document.getElementById('w2')?.value||weights.w2);
  const w3=parseInt(document.getElementById('w3')?.value||weights.w3);
  const w4=parseInt(document.getElementById('w4')?.value||weights.w4);
  const sum=(w1+w2+w3+w4)/100;
  ['w1','w2','w3','w4'].forEach((id,i)=>{
    const v=[w1,w2,w3,w4][i];
    const el=document.getElementById(id+'v');
    if(el) el.textContent=(v/100).toFixed(2);
  });
  const se=document.getElementById('sum-w');
  if(se){se.textContent=sum.toFixed(2);se.style.color=Math.abs(sum-1)>0.05?'var(--amber)':'var(--teal)';}
  const tbody=document.getElementById('score-tbody');
  if(!tbody) return;
  tbody.innerHTML=expData.map(e=>{
    const s=calcScore(e,w1,w2,w3,w4);
    return `<tr>
      <td class="mn">${e.id}</td>
      <td class="mn" style="color:var(--teal)">${e.gest}</td>
      <td>${e.dias}</td><td>${e.tramo}</td>
      <td class="mn">${e.importe.toLocaleString()}€</td>
      <td style="text-align:center">${e.reactiv}</td>
      <td style="text-align:center">${e.pbase}</td>
      <td><span style="font-family:var(--font-mono);font-weight:700;color:${getScoreColor(s)}">${s.toFixed(1)}</span></td>
      <td>${scorePill(s)}</td>
    </tr>`;
  }).join('');
}

function resetWeights(){
  weights={...DEFAULT_WEIGHTS};
  ['w1','w2','w3','w4'].forEach((id,i)=>{
    const el=document.getElementById(id);
    if(el) el.value=[DEFAULT_WEIGHTS.w1,DEFAULT_WEIGHTS.w2,DEFAULT_WEIGHTS.w3,DEFAULT_WEIGHTS.w4][i];
  });
  recalcScoring();
}

algoritmo: ()=>`
<div class="sec">
  <div class="sl">Flujo de distribución diaria</div>
  <div class="flow" style="margin-bottom:18px">
    ${['01·Ingesta TRANSMI','02·Cálculo S(e)','03·Clasificación tramo','04·Cupo reactivaciones','05·Asignación equilibrada','06·Cola NEXA'].map((s,i)=>`
    <div class="fs${i===1||i===4?' card-click':''}${i===1||i===4?' card-click':''}" style="${i===1||i===4?'border-color:var(--teal);background:var(--teal-dim);cursor:pointer':''}" ${i===1?'onclick="openPseudoModal()"':''}>
      <div class="fs-n">${s.split('·')[0]}</div>
      <div class="fs-t">${s.split('·')[1]}</div>
      ${i===1?'<div style="font-size:9px;color:var(--teal);margin-top:2px">▸ ver detalle</div>':''}
    </div>${i<5?'<div class="fa">→</div>':''}`).join('')}

</div>
<div class="sec">
  <div class="sl">Pseudocódigo — pulsa para explicación detallada</div>
  <div class="formula card-click" onclick="openPseudoModal()" style="cursor:pointer">
    <span class="formula-hint">▸ Pulsa para explicación detallada</span>
    <span class="cm">// PASO 1: Ingesta y scoring</span><br>
    expedientes = <span class="hl">cargar_desde_TRANSMI()</span><br>
    <span class="hl">para cada</span> e <span class="hl">en</span> expedientes:<br>
    &nbsp;&nbsp;e.score = <span class="hl2">calcular_S(e)</span> &nbsp;<span class="cm">// S(e) definida en [A]</span><br>
    &nbsp;&nbsp;e.tramo = <span class="hl2">asignar_tramo</span>(e.dias_impago)<br><br>
    <span class="cm">// PASO 2: Separar reactivaciones (cupo máx 8%)</span><br>
    reactiv = <span class="hl">filtrar</span>(expedientes, reactivaciones > 0)<br>
    reactiv = <span class="hl">limitar</span>(reactiv, capacidad_total × 0.08)<br><br>
    <span class="cm">// PASO 3: Ordenar por score DESC</span><br>
    cola_global = <span class="hl">ordenar</span>(nuevos + reactiv, score DESC)<br><br>
    <span class="cm">// PASO 4: Asignación equitativa por dificultad</span><br>
    G_min = gestor con <span class="hl2">menor dificultad_media</span><br>
    <span class="hl">asignar</span>(e, G_min); recalcular dificultad_media
  </div>
</div>
<div class="sec">

      <tr><td>${r[0]}</td><td style="color:var(--text)">${r[1]}</td><td style="color:var(--teal)">${r[2]}</td></tr>`).join('')}

    <div style="display:flex;flex-direction:column;gap:6px;font-size:11px;color:var(--text3)">
      ${['Los pesos iniciales (0.40/0.25/0.20/0.15) requieren calibración con histórico real.','La capacidad de 300 exp/gestor/día es homogénea; varía en la práctica por tramo y complejidad.','El cupo del 8% de reactivaciones debe validarse con el equipo operativo real.','No se asume acceso directo a bases de datos TRANSMI/NEXA; modelo sobre ficheros de ingesta.','El dashboard es capa de visualización externa sin modificar sistemas legacy.','Período de calibración: 2 semanas antes de activar automatización completa.','Todos los datos de ejemplo son 100% sintéticos. Cumplimiento RGPD garantizado.'].map(s=>`
      <div style="display:flex;gap:8px;align-items:flex-start;padding:5px 8px;background:var(--surface);border-radius:6px">
        <span style="color:var(--teal);font-family:var(--font-mono);flex-shrink:0;font-size:10px">[S]</span>${s}
      </div>`).join('')}
    </div>
  </div>
</div>`,
};

// ROUTER
// ═══════════════════════════════════════════════════
function goTab(id) {
  document.querySelectorAll('.nb').forEach(b=>b.classList.toggle('active',b.dataset.tab===id));
  const main=document.getElementById('main');
  main.style.animation='none';main.innerHTML=TABS[id]();
  void main.offsetHeight;main.style.animation='';
  if(id==='scoring'){recalcScoring();}
  if(id==='algoritmo'){simData();}
}

goTab('dashboard');
</script>
